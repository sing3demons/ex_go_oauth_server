<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>OIDC Secure Gateway</title>
    <style>
        body { font-family: -apple-system, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; background-color: #f7f9fc; margin: 0; }
        .container { background: white; padding: 40px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); width: 400px; }
        input { width: 100%; padding: 12px; margin: 10px 0 20px 0; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; border: none; border-radius: 6px; cursor: pointer; font-size: 16px; font-weight: 600; margin-bottom: 10px; }
        
        .btn-primary { background: #007bff; color: white; }
        .btn-primary:hover { background: #0056b3; }
        
        .btn-success { background: #28a745; color: white; }
        .btn-success:hover { background: #218838; }

        .logo { text-align: center; font-size: 24px; font-weight: bold; margin-bottom: 20px; color: #333; }
        
        .tabs { display: flex; margin-bottom: 20px; border-bottom: 2px solid #eee; }
        .tab { flex: 1; text-align: center; padding: 10px; cursor: pointer; color: #777; font-weight: 600; transition: 0.3s; }
        .tab.active { color: #007bff; border-bottom: 2px solid #007bff; }
        
        .form-section { display: none; }
        .form-section.active { display: block; }

        .error { color: #dc3545; font-size: 14px; margin-bottom: 15px; text-align: center; }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">OIDC Gateway</div>
        
        {{if .Error}}
        <div class="error">{{.Error}}</div>
        {{end}}

        <div class="tabs">
            <div class="tab active" onclick="switchTab('login')">Log In</div>
            <div class="tab" onclick="switchTab('register')">Sign Up</div>
        </div>

        <!-- Login Form -->
        <div id="login-form" class="form-section active">
            <form method="POST" action="/login?sid={{.SID}}&tid={{.TID}}">
                <label>Username</label>
                <input type="text" id="login-username" name="username" placeholder="your username" required />
                <label>Password</label>
                <input type="password" name="password" placeholder="••••••••" required />
                <button type="submit" class="btn-primary">Sign In with Password</button>
                <div style="text-align: center; margin: 15px 0; color: #777;">or</div>
                <button type="button" id="passkey-login-btn" style="background: #f1f5f9; color: #0f172a; border: 1px solid #cbd5e1; font-size: 16px; font-weight: 600; padding: 12px; border-radius: 6px; cursor: pointer; width: 100%;">👆 Sign in with Passkey</button>
            </form>
        </div>

        <!-- Register Form -->
        <div id="register-form" class="form-section">
            <form method="POST" action="/register?sid={{.SID}}&tid={{.TID}}">
                <label>Username</label>
                <input type="text" name="username" placeholder="new username" required />
                <label>Email</label>
                <input type="email" name="email" placeholder="email@address.com" required />
                <label>First Name</label>
                <input type="text" name="given_name" placeholder="First Name" />
                <label>Last Name</label>
                <input type="text" name="family_name" placeholder="Last Name" />
                <label>Nickname</label>
                <input type="text" name="nickname" placeholder="Nickname" />
                
                <label>Gender</label>
                <select name="gender" style="width: 100%; padding: 12px; margin: 10px 0 20px 0; border: 1px solid #ccc; border-radius: 6px;">
                    <option value="">Select Gender</option>
                    <option value="male">Male</option>
                    <option value="female">Female</option>
                    <option value="other">Other</option>
                </select>

                <label>Phone Number</label>
                <input type="tel" name="phone_number" placeholder="+66 812345678" />

                <label>Password</label>
                <input type="password" name="password" placeholder="••••••••" required />
                <button type="submit" class="btn-success">Create Account</button>
            </form>
        </div>

    </div>

    <script>
        function switchTab(tab) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.form-section').forEach(f => f.classList.remove('active'));
            
            if (tab === 'login') {
                document.querySelectorAll('.tab')[0].classList.add('active');
                document.getElementById('login-form').classList.add('active');
            } else {
                document.querySelectorAll('.tab')[1].classList.add('active');
                document.getElementById('register-form').classList.add('active');
            }
        }

        // Auto-switch back to register tab if coming back with errors during registration
        if (window.location.hash === '#register') {
            switchTab('register');
        }

        // --- WebAuthn Helper Functions ---
        function bufferDecode(value) {
            return Uint8Array.from(atob(value.replace(/-/g, "+").replace(/_/g, "/")), c => c.charCodeAt(0));
        }

        function bufferEncode(value) {
            return btoa(String.fromCharCode.apply(null, new Uint8Array(value)))
                .replace(/\+/g, "-")
                .replace(/\//g, "_")
                .replace(/=/g, "");
        }

        document.getElementById('passkey-login-btn').addEventListener('click', async () => {
            const usernameInput = document.getElementById('login-username').value;
            if (!usernameInput) {
                alert('Please enter your username first to use Passkey.');
                return;
            }

            try {
                const sid = new URLSearchParams(window.location.search).get('sid') || '{{.SID}}';
                const tid = new URLSearchParams(window.location.search).get('tid') || '{{.TID}}';

                // 1. Begin Login
                const beginRes = await fetch(`/webauthn/login/begin?username=${encodeURIComponent(usernameInput)}`);
                if (!beginRes.ok) {
                    const err = await beginRes.json();
                    throw new Error(err.error || 'Failed to begin passkey login');
                }
                const makeAssertionOptions = await beginRes.json();

                // 2. Decode challenge
                makeAssertionOptions.publicKey.challenge = bufferDecode(makeAssertionOptions.publicKey.challenge);
                makeAssertionOptions.publicKey.allowCredentials.forEach(cred => {
                    cred.id = bufferDecode(cred.id);
                });

                // 3. Prompt WebAuthn
                const assertion = await navigator.credentials.get({
                    publicKey: makeAssertionOptions.publicKey
                });

                // 4. Encode result
                const clientResponse = {
                    id: assertion.id,
                    rawId: bufferEncode(assertion.rawId),
                    type: assertion.type,
                    response: {
                        authenticatorData: bufferEncode(assertion.response.authenticatorData),
                        clientDataJSON: bufferEncode(assertion.response.clientDataJSON),
                        signature: bufferEncode(assertion.response.signature),
                        userHandle: assertion.response.userHandle ? bufferEncode(assertion.response.userHandle) : null,
                    }
                };

                // 5. Finish Login
                const finishRes = await fetch(`/webauthn/login/finish?username=${encodeURIComponent(usernameInput)}&sid=${encodeURIComponent(sid)}&tid=${encodeURIComponent(tid)}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(clientResponse)
                });

                if (finishRes.ok) {
                    const data = await finishRes.json();
                    window.location.href = data.redirect_to || '/consent?sid=' + sid + '&tid=' + tid;
                } else {
                    const errPayload = await finishRes.json();
                    throw new Error(errPayload.error || 'Failed to finish login');
                }

            } catch (err) {
                console.error(err);
                alert('Error: ' + err.message);
            }
        });
    </script>
</body>
</html>
