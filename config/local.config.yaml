app:
  name: "OAuth"
  component-name: 'oauth oidc'
  description: "OAuth Service"
  version: "1.0.0"

  issuer: "http://localhost:8080"
  key-rotation-duration: "24h"
  key-grace-period: "1h"
  key-max-retention-count: 5

oidc:
  scopes_supported:
    - "openid"
    - "profile"
    - "email"
    - "offline_access"
  response_types_supported:
    - "code"
  grant_types_supported:
    - "authorization_code"
    - "client_credentials"
    - "refresh_token"
    - "urn:ietf:params:oauth:grant-type:token-exchange"
  subject_types_supported:
    - "public"
  id_token_signing_alg_values_supported:
    - "RS256"
    - "ES256"
    - "EdDSA"
  token_endpoint_auth_methods_supported:
    - "client_secret_basic"
    - "client_secret_post"
  claims_supported:
    - "sub"
    - "iss"
    - "aud"
    - "exp"
    - "iat"
    - "name"
    - "email"
  code_challenge_methods_supported:
    - "S256"
    - "plain"

trusted_issuers:
  - issuer: "https://accounts.google.com"
    name: "Google"

log:
  detail:
    level: "debug"
    enable-file-logging: true
    console: true
    log-file-properties:
      dirname: "logs/detail"
      filename: "detail-%DATE%"
      date-pattern: "YYYY-MM-DD-HH"
      extension: ".log"
    rotation:
      max-size: 104857600 # 100 MB
      max-age: 7          # days
      max-backups: 10
      compress: true
  summary:
    level: "info"
    enable-file-logging: true
    console: true
    log-file-properties:
      dirname: "logs/summary"
      filename: "summary-%DATE%"
      date-pattern: "YYYY-MM-DD-HH"
      extension: ".log"
    rotation:
      max-size: 104857600 # 100 MB
      max-age: 7          # days
      max-backups: 10
      compress: true